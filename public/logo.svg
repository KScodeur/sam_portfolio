<svg width="320" height="50" viewBox="0 0 320 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Advanced gradient definitions -->
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F13024;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F13024;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff4d4d;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Modern "KS" with bold monospace style -->
  <text x="0" y="36" font-family="Consolas, Monaco, monospace" font-size="32" font-weight="900" fill="url(#mainGradient)" filter="url(#glow)" letter-spacing="2">KS</text>

  <!-- Code brackets with gradient -->
  <text x="55" y="36" font-family="Consolas, Monaco, monospace" font-size="26" font-weight="bold" fill="url(#codeGradient)" opacity="0.9">&lt;/&gt;</text>

  <!-- "codeur" text with modern spacing -->
  <text x="145" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="1.5">codeur</text>

  <!-- Code icon decoration -->
  <g transform="translate(250, 5)">
    <!-- Left bracket with gradient stroke -->
    <path d="M5 10 L5 30 L15 25 M5 30 L15 35" stroke="url(#accentGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Dot with glow effect -->
    <circle cx="22.5" cy="22.5" r="3" fill="url(#accentGradient)" filter="url(#glow-strong)"/>

    <!-- Right bracket -->
    <path d="M30 10 L30 30 L20 25 M30 30 L20 35" stroke="url(#accentGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Dynamic accent elements -->
  <g opacity="0.4">
    <!-- First floating pixel -->
    <rect x="295" y="12" width="4" height="4" fill="#F13024" rx="1"/>
    <!-- Second floating pixel -->
    <rect x="300" y="16" width="4" height="4" fill="#F13024" rx="1"/>
    <!-- Third floating pixel -->
    <rect x="305" y="20" width="4" height="4" fill="#F13024" rx="1"/>
  </g>

  <!-- Underline accent -->
  <line x1="0" y1="45" x2="270" y2="45" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.5"/>

  <!-- Small decorative dots -->
  <g opacity="0.3">
    <circle cx="285" cy="42" r="1" fill="#F13024"/>
    <circle cx="290" cy="38" r="1" fill="#F13024"/>
    <circle cx="295" cy="34" r="1" fill="#F13024"/>
  </g>
</svg>